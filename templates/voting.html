<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
    <div class="container">
        <h2>Decentralized Voting</h2>
        <input type="text" id="ideaName" placeholder="Enter candidate or idea name">
        <button class="btn" onclick="castVote()">Cast Vote</button>
        <button class="btn" onclick="checkVotes()">Check Tally</button>
        
        <form action="/main" method="post">
            <input type="submit" value="Main">
        </form>
        
        <p id="status_text"></p>

        <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
        <script>
            // 部署后，填入你新的合约地址
            const contractAddress = "0x6362470da4e83fd2da99d9c4387617a148d8d9d0";
            
            const contractABI = [
	{
		"inputs": [
			{
				"internalType": "string",
				"name": "idea",
				"type": "string"
			}
		],
		"name": "vote",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [
			{
				"internalType": "string",
				"name": "idea",
				"type": "string"
			}
		],
		"name": "getVotes",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{
				"internalType": "string",
				"name": "",
				"type": "string"
			}
		],
		"name": "votes",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"stateMutability": "view",
		"type": "function"
	}
];
            const web3 = new Web3(Web3.givenProvider);
            const contract = new web3.eth.Contract(contractABI, contractAddress);

            async function castVote() {
                const accounts = await web3.eth.requestAccounts();
                const idea = document.getElementById('ideaName').value;
                if (!idea) return;

                document.getElementById('status_text').innerText = "Voting in progress. Awaiting confirmation...";
                
                await contract.methods.vote(idea).send({ from: accounts[0] });
                
                document.getElementById('status_text').innerText = "Vote cast successfully.";
                document.getElementById('ideaName').value = "";
            }

            async function checkVotes() {
                const idea = document.getElementById('ideaName').value;
                if (!idea) {
                    document.getElementById('status_text').innerText = "Please enter a name to check.";
                    return;
                }
                const result = await contract.methods.getVotes(idea).call();
                document.getElementById('status_text').innerText = idea + " currently has " + result + " vote(s).";
            }
        </script>
    </div>
</body>

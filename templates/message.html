<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
    <div class="container">
        <h2>Message Board</h2>
        <input type="text" id="newMessage" placeholder="Enter your message">
        <button class="btn" onclick="setMessage()">Set Message</button>
        <button class="btn" onclick="getMessage()">View Message</button>
        
        <form action="/main" method="post">
            <input type="submit" value="Main">
        </form>
        
        <p id="view_message"></p >

        <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
        <script>
        
            const contractAddress = "0x2879ef5000f7e6ed0160530c4a74e4ee6825a8be";
            
            
            const contractABI = [
	{
		"inputs": [],
		"name": "message",
		"outputs": [
			{
				"internalType": "string",
				"name": "",
				"type": "string"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{
				"internalType": "string",
				"name": "_message",
				"type": "string"
			}
		],
		"name": "setMessage",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	}
];
            
            const web3 = new Web3(Web3.givenProvider);
            const contract = new web3.eth.Contract(contractABI, contractAddress);

            async function setMessage() {
                const accounts = await web3.eth.requestAccounts();
                const msg = document.getElementById('newMessage').value;
                if (!msg) return;

                document.getElementById('view_message').innerText = "Transaction pending, please wait...";
                
                
                await contract.methods.setMessage(msg).send({ from: accounts[0] });
                
                document.getElementById('view_message').innerText = "Transaction confirmed! You can now click 'View Message'.";
                document.getElementById('newMessage').value = "";
            }

            async function getMessage() {
               
                const result = await contract.methods.message().call();
                document.getElementById('view_message').innerText = "Current Message is: " + result;
            }
        </script>
    </div>
</body>
